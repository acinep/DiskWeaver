name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The underlying need, not just the proposed solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        What you'd like to see. If it touches the planner/algorithm, disk
        layout, or lifecycle operations, note whether it's covered by
        docs/PRD.md's non-goals or open questions (§4/§9) already.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
