name: Bug report
description: Something didn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: is this a security vulnerability (data loss, privilege
        escalation, auth bypass)? If so, please use
        [private vulnerability reporting](../../security/advisories/new)
        instead of a public issue — see SECURITY.md.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you expected, and what happened instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: >
        Include the exact command(s) run (CLI, or the daemon API call the
        UI made) and, if relevant, the disk inventory involved
        (`diskweaver inventory ...` output, or `lsblk` — redact serial
        numbers if it's real hardware you'd rather not share in full).
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >
        Daemon logs (`journalctl -u diskweaverd`), the generated
        execution script, or the journal file under
        `/var/lib/diskweaver/journal/`, if applicable.
      render: shell

  - type: input
    id: version
    attributes:
      label: DiskWeaver version
      description: Output of the version shown in the UI, or the `.deb` version installed.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Distro/kernel version, and whether this was against real disks, loop devices, or WSL2.
    validations:
      required: true
