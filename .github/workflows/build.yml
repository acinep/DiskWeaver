name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    # Read-only: this job builds/tests/packages on every push, PR, and dispatch, so it
    # gets no write access. Only the tag-triggered release job below needs contents: write.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/DiskWeaver.Cockpit/package-lock.json

      # clang+zlib1g-dev are ILCompiler's native toolchain for the AOT publish step below --
      # mirrors scripts/wsl-dev/setup-wsl.sh's own dependency list for the same reason.
      - name: Install native AOT build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore and test .NET solution
        run: dotnet test src/DiskWeaver.slnx -c Release

      - name: Build Cockpit plugin + standalone SPA
        working-directory: src/DiskWeaver.Cockpit
        run: |
          npm ci
          npm run build

      # Not just an optimization check -- PublishAot has already caught real bugs at publish
      # time that `dotnet test` alone didn't (see PamAuthenticator's history): NativeAOT can't
      # use Marshal.GetFunctionPointerForDelegate-style reflection that ordinary JIT tolerates.
      - name: Verify daemon publishes under NativeAOT
        run: dotnet publish src/DiskWeaver.Daemon -c Release -r linux-x64 --self-contained -o /tmp/diskweaver-aot-check

      # Real version on a tag push (refs/tags/v0.1.0 -> 0.1.0); every other trigger (a plain
      # push to main, a PR, workflow_dispatch) gets a throwaway version tied to the run number --
      # never meant to be installed anywhere, just proves the package still builds.
      - name: Determine package version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0-ci.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .deb package
        run: scripts/build-deb.sh "${{ steps.version.outputs.value }}"

      - uses: actions/upload-artifact@v7
        with:
          name: diskweaver-deb
          path: dist/*.deb

  # Only tag pushes (e.g. `git tag v0.1.0 && git push --tags`) get a real, permanent,
  # publicly-downloadable release -- the artifact above expires (90 days) and needs GitHub
  # repo access to fetch; this doesn't. Split into its own job (rather than a step in
  # build-test-package) so contents: write is only ever granted for tag pushes, never for
  # ordinary PR/branch builds.
  release:
    needs: build-test-package
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: diskweaver-deb
          path: dist

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" dist/*.deb --title "${{ github.ref_name }}" --generate-notes
