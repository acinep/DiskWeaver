<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>DiskWeaver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--
        No cache-busting query string here (unlike the Cockpit index.html, which needs one --
        see its own comment): the daemon serves this via ASP.NET Core's static file middleware,
        which sends real Last-Modified/ETag headers, so the browser correctly revalidates instead
        of blindly caching -- cockpit-bridge's package server is the one that sends no caching
        headers at all.
    -->
    <link rel="stylesheet" href="dist/app.css">
</head>
<body>
    <div id="app"></div>
    <script src="dist/app.js"></script>
</body>
</html>
