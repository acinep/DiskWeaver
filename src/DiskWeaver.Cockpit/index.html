<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>DiskWeaver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--
        ?v=N cache-busts dist/app.css/dist/app.js: cockpit-bridge sends no Cache-Control/ETag for
        package files (confirmed against its own source -- content is read fresh from disk per
        request, but nothing tells the browser that), so without a changing URL the browser's own
        HTTP cache can keep serving a stale copy indefinitely after an edit. Bump the number on
        BOTH tags below whenever the build output changes (i.e. after every `npm run build`).
        This doesn't help if index.html itself was cached before this comment existed -- see
        docs/cockpit-plugin.md's caching note for the hard-refresh fallback.
    -->
    <link rel="stylesheet" href="dist/app.css?v=24">
</head>
<body>
    <div id="app"></div>

    <script src="../base1/cockpit.js"></script>
    <script src="dist/app.js?v=24"></script>
</body>
</html>
